<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanDollar | User Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .bottom-nav a.active { color: #2563eb; border-bottom-color: #2563eb; }
        .nav-item { transition: all 0.2s; }
    </style>
</head>
<body class="bg-gray-100 pb-16">
    <!-- Main Content -->
    <div id="appContent" class="container mx-auto px-4 py-6 max-w-4xl">
        <!-- Dynamic content will be injected here -->
    </div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg">
        <div class="flex justify-around max-w-md mx-auto">
            <a href="#" data-tab="dashboard" class="nav-item flex-1 text-center py-3 text-gray-500 hover:text-blue-600 transition">
                <i class="fas fa-tachometer-alt text-xl"></i>
                <span class="text-xs block">Dashboard</span>
            </a>
            <a href="#" data-tab="products" class="nav-item flex-1 text-center py-3 text-gray-500 hover:text-blue-600 transition">
                <i class="fas fa-box-open text-xl"></i>
                <span class="text-xs block">Products</span>
            </a>
            <a href="#" data-tab="subscriptions" class="nav-item flex-1 text-center py-3 text-gray-500 hover:text-blue-600 transition">
                <i class="fas fa-calendar-alt text-xl"></i>
                <span class="text-xs block">Subscriptions</span>
            </a>
            <a href="#" data-tab="profile" class="nav-item flex-1 text-center py-3 text-gray-500 hover:text-blue-600 transition">
                <i class="fas fa-user text-xl"></i>
                <span class="text-xs block">Profile</span>
            </a>
            <a href="#" data-tab="wallet" class="nav-item flex-1 text-center py-3 text-gray-500 hover:text-blue-600 transition">
                <i class="fas fa-wallet text-xl"></i>
                <span class="text-xs block">Wallet</span>
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs, query, where, addDoc, deleteDoc, Timestamp, increment, arrayUnion, serverTimestamp, runTransaction } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDm-PeCeRdlx6TKPEvKNdT93lMqb5D5O20",
            authDomain: "urbanpay-c5aee.firebaseapp.com",
            projectId: "urbanpay-c5aee",
            storageBucket: "urbanpay-c5aee.firebasestorage.app",
            messagingSenderId: "648155825006",
            appId: "1:648155825006:web:16d6ea4dfab808920b777f",
            measurementId: "G-CTKZN6VHPS"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let currentUserData = null;
        let currentTab = "dashboard";

        // Helper functions
        function formatMoney(amount) { return `Ksh ${amount.toLocaleString()}`; }

        // Load sample products if none exist
        async function seedProducts() {
            const productsRef = collection(db, "products");
            const snapshot = await getDocs(productsRef);
            if (snapshot.empty) {
                const sampleProducts = [
                    { name: "Sika Deer", price: 9000, durationDays: 180, roi: 700, dailyIncome: 350, imageUrl: "https://picsum.photos/id/200/200/150", status: true, createdAt: serverTimestamp() },
                    { name: "Golden Eagle", price: 5000, durationDays: 90, roi: 500, dailyIncome: 277, imageUrl: "https://picsum.photos/id/201/200/150", status: true, createdAt: serverTimestamp() },
                    { name: "Swift Fox", price: 2000, durationDays: 30, roi: 300, dailyIncome: 200, imageUrl: "https://picsum.photos/id/202/200/150", status: true, createdAt: serverTimestamp() }
                ];
                for (const p of sampleProducts) {
                    await addDoc(productsRef, p);
                }
                console.log("Sample products added.");
            }
        }

        // Load dashboard content
        async function loadDashboard() {
            if (!currentUserData) return;
            const html = `
                <div class="bg-white rounded-xl shadow-md p-6 mb-6">
                    <h2 class="text-2xl font-bold text-gray-800">Welcome back, ${currentUserData.displayName}!</h2>
                    <p class="text-gray-500">Here's your portfolio overview</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white rounded-xl shadow-md p-6">
                        <div class="text-gray-500 mb-2">Total Balance</div>
                        <div class="text-3xl font-bold text-gray-800">${formatMoney(currentUserData.totalBalance)}</div>
                        <div class="text-green-500 text-sm">+0%</div>
                    </div>
                    <div class="bg-white rounded-xl shadow-md p-6">
                        <div class="text-gray-500 mb-2">Active Packages</div>
                        <div class="text-3xl font-bold text-gray-800">${currentUserData.activePackagesCount}</div>
                    </div>
                    <div class="bg-white rounded-xl shadow-md p-6">
                        <div class="text-gray-500 mb-2">Daily Task Commission</div>
                        <div class="text-3xl font-bold text-gray-800">${formatMoney(currentUserData.dailyTaskCommission)}</div>
                        <div class="text-red-500 text-sm">-5% commission</div>
                    </div>
                    <div class="bg-white rounded-xl shadow-md p-6">
                        <div class="text-gray-500 mb-2">Referral Bonus</div>
                        <div class="text-3xl font-bold text-gray-800">${formatMoney(currentUserData.referralBonus)}</div>
                        <div class="text-red-500 text-sm">-15% referral bonus</div>
                    </div>
                </div>
                <div class="mt-6 bg-white rounded-xl shadow-md p-6">
                    <h3 class="text-xl font-semibold mb-4">Available Balance</h3>
                    <div class="text-3xl font-bold text-blue-600">${formatMoney(currentUserData.availableBalance)}</div>
                    <hr class="my-4">
                    <div class="flex justify-between text-gray-600">
                        <span>Total Invested</span>
                        <span class="font-semibold">${formatMoney(currentUserData.totalInvested)}</span>
                    </div>
                    <div class="flex justify-between text-gray-600 mt-2">
                        <span>Total Returns</span>
                        <span class="font-semibold">${formatMoney(currentUserData.totalReturns)}</span>
                    </div>
                </div>
            `;
            document.getElementById("appContent").innerHTML = html;
        }

        // Products: list and purchase
        async function loadProducts() {
            const productsRef = collection(db, "products");
            const q = query(productsRef, where("status", "==", true));
            const snapshot = await getDocs(q);
            let productsHtml = `<div class="bg-white rounded-xl shadow-md p-6"><h2 class="text-xl font-bold mb-4">Available Products</h2><div class="grid gap-4">`;
            snapshot.forEach(docSnap => {
                const p = docSnap.data();
                productsHtml += `
                    <div class="border rounded-lg p-4 flex flex-col md:flex-row gap-4">
                        <img src="${p.imageUrl}" class="w-32 h-32 object-cover rounded" alt="${p.name}">
                        <div class="flex-1">
                            <h3 class="text-lg font-bold">${p.name}</h3>
                            <p>Price: ${formatMoney(p.price)}</p>
                            <p>Duration: ${p.durationDays} days</p>
                            <p>ROI: ${p.roi}%</p>
                            <p>Daily Income: ${formatMoney(p.dailyIncome)}</p>
                            <button onclick="purchaseProduct('${docSnap.id}', ${p.price})" class="mt-2 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Buy Now</button>
                        </div>
                    </div>
                `;
            });
            productsHtml += `</div></div>`;
            document.getElementById("appContent").innerHTML = productsHtml;
            window.purchaseProduct = async (productId, price) => {
                if (currentUserData.availableBalance < price) {
                    alert("Insufficient balance");
                    return;
                }
                try {
                    await runTransaction(db, async (transaction) => {
                        const userRef = doc(db, "users", currentUser.uid);
                        const productRef = doc(db, "products", productId);
                        const productSnap = await transaction.get(productRef);
                        if (!productSnap.exists()) throw new Error("Product not found");
                        const product = productSnap.data();
                        const userSnap = await transaction.get(userRef);
                        const userBal = userSnap.data().availableBalance;
                        if (userBal < price) throw new Error("Insufficient balance");
                        
                        // Deduct balance
                        transaction.update(userRef, {
                            availableBalance: increment(-price),
                            totalInvested: increment(price),
                            activePackagesCount: increment(1)
                        });
                        
                        // Create subscription
                        const endDate = new Date();
                        endDate.setDate(endDate.getDate() + product.durationDays);
                        const subscriptionRef = doc(collection(db, "subscriptions"));
                        transaction.set(subscriptionRef, {
                            userId: currentUser.uid,
                            productId: productId,
                            productName: product.name,
                            productImage: product.imageUrl,
                            dailyIncome: product.dailyIncome,
                            durationDays: product.durationDays,
                            startDate: serverTimestamp(),
                            endDate: Timestamp.fromDate(endDate),
                            lastClaimDate: null,
                            totalEarned: 0,
                            status: "active"
                        });
                        
                        // Record transaction
                        const transRef = doc(collection(db, "transactions"));
                        transaction.set(transRef, {
                            userId: currentUser.uid,
                            type: "package_purchase",
                            amount: price,
                            status: "completed",
                            description: `Purchased ${product.name}`,
                            timestamp: serverTimestamp()
                        });
                    });
                    alert("Purchase successful!");
                    refreshUserData();
                    loadProducts(); // refresh product list (though not necessary)
                } catch (error) {
                    alert("Purchase failed: " + error.message);
                }
            };
        }

        // Subscriptions
        async function loadSubscriptions() {
            const subsRef = collection(db, "subscriptions");
            const q = query(subsRef, where("userId", "==", currentUser.uid), where("status", "==", "active"));
            const snapshot = await getDocs(q);
            let subsHtml = `<div class="bg-white rounded-xl shadow-md p-6"><h2 class="text-xl font-bold mb-4">Active Subscriptions</h2>`;
            if (snapshot.empty) {
                subsHtml += `<p>No active subscriptions.</p>`;
            } else {
                subsHtml += `<div class="space-y-4">`;
                snapshot.forEach(docSnap => {
                    const sub = docSnap.data();
                    const remainingDays = Math.max(0, Math.ceil((sub.endDate.toDate() - new Date()) / (1000 * 3600 * 24)));
                    const lastClaimDate = sub.lastClaimDate ? sub.lastClaimDate.toDate() : null;
                    const today = new Date().toDateString();
                    const canClaim = !lastClaimDate || lastClaimDate.toDateString() !== today;
                    subsHtml += `
                        <div class="border rounded-lg p-4">
                            <div class="flex items-center gap-4">
                                <img src="${sub.productImage}" class="w-16 h-16 object-cover rounded">
                                <div>
                                    <h3 class="font-bold">${sub.productName}</h3>
                                    <p>Daily Income: ${formatMoney(sub.dailyIncome)}</p>
                                    <p>Remaining: ${remainingDays} days</p>
                                    <p>Total Earned: ${formatMoney(sub.totalEarned)}</p>
                                    ${canClaim ? `<button onclick="claimIncome('${docSnap.id}', ${sub.dailyIncome})" class="mt-2 bg-green-600 text-white px-3 py-1 rounded text-sm">Claim Daily Income</button>` : `<span class="text-gray-400 text-sm">Already claimed today</span>`}
                                </div>
                            </div>
                        </div>
                    `;
                });
                subsHtml += `</div>`;
            }
            subsHtml += `</div>`;
            document.getElementById("appContent").innerHTML = subsHtml;
            window.claimIncome = async (subscriptionId, amount) => {
                try {
                    await runTransaction(db, async (transaction) => {
                        const subRef = doc(db, "subscriptions", subscriptionId);
                        const userRef = doc(db, "users", currentUser.uid);
                        const subSnap = await transaction.get(subRef);
                        if (!subSnap.exists()) throw new Error("Subscription not found");
                        const subData = subSnap.data();
                        if (subData.status !== "active") throw new Error("Subscription not active");
                        const lastClaim = subData.lastClaimDate ? subData.lastClaimDate.toDate() : null;
                        const today = new Date().toDateString();
                        if (lastClaim && lastClaim.toDateString() === today) throw new Error("Already claimed today");
                        
                        // Update subscription
                        transaction.update(subRef, {
                            totalEarned: increment(amount),
                            lastClaimDate: serverTimestamp()
                        });
                        // Update user
                        transaction.update(userRef, {
                            availableBalance: increment(amount),
                            totalReturns: increment(amount)
                        });
                        // Record transaction
                        const transRef = doc(collection(db, "transactions"));
                        transaction.set(transRef, {
                            userId: currentUser.uid,
                            type: "daily_income",
                            amount: amount,
                            status: "completed",
                            description: `Daily income from ${subData.productName}`,
                            timestamp: serverTimestamp()
                        });
                    });
                    alert("Income claimed!");
                    refreshUserData();
                    loadSubscriptions();
                } catch (error) {
                    alert("Claim failed: " + error.message);
                }
            };
        }

        // Profile
        async function loadProfile() {
            const html = `
                <div class="bg-white rounded-xl shadow-md p-6 text-center">
                    <div class="w-24 h-24 bg-blue-100 rounded-full flex items-center justify-center text-3xl font-bold text-blue-600 mx-auto">${currentUserData.displayName.charAt(0).toUpperCase()}</div>
                    <h2 class="text-xl font-bold mt-4">${currentUserData.displayName}</h2>
                    <p class="text-gray-500">${currentUserData.email}</p>
                    <button onclick="signOutUser()" class="mt-4 bg-red-500 text-white px-4 py-2 rounded">Sign Out</button>
                </div>
                <div class="bg-white rounded-xl shadow-md p-6 mt-6">
                    <h3 class="font-semibold mb-2">Referral Link</h3>
                    <div class="flex gap-2">
                        <input type="text" readonly value="https://urbandollar.com/register?ref=${currentUserData.referralCode}" class="flex-1 p-2 border rounded bg-gray-50">
                        <button onclick="copyToClipboard(this.previousElementSibling.value)" class="bg-gray-200 px-4 rounded">Copy</button>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow-md p-6 mt-6">
                    <div class="flex justify-between"><span>Total Invested</span><span>${formatMoney(currentUserData.totalInvested)}</span></div>
                    <div class="flex justify-between mt-2"><span>Active Packages</span><span>${currentUserData.activePackagesCount}</span></div>
                </div>
            `;
            document.getElementById("appContent").innerHTML = html;
            window.signOutUser = () => signOut(auth);
            window.copyToClipboard = (text) => {
                navigator.clipboard.writeText(text);
                alert("Copied!");
            };
        }

        // Wallet
        async function loadWallet() {
            const html = `
                <div class="bg-white rounded-xl shadow-md p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold">My Wallet</h2>
                        <button onclick="refreshWallet()" class="text-blue-600"><i class="fas fa-sync-alt"></i> Refresh</button>
                    </div>
                    <div class="text-center p-4 bg-blue-50 rounded-lg">
                        <div class="text-gray-500">Total Balance</div>
                        <div class="text-4xl font-bold text-blue-600">${formatMoney(currentUserData.totalBalance)}</div>
                        <div class="flex justify-between mt-4 text-sm">
                            <span>Pending: ${formatMoney(currentUserData.pendingBalance)}</span>
                            <span>Available: ${formatMoney(currentUserData.availableBalance)}</span>
                        </div>
                    </div>
                    <div class="flex justify-between mt-6">
                        <div><span class="text-gray-500">Total Earnings</span><br><span class="font-bold">${formatMoney(currentUserData.totalReturns)}</span></div>
                        <div><span class="text-gray-500">Total Withdrawals</span><br><span class="font-bold">${formatMoney(currentUserData.totalWithdrawn)}</span></div>
                    </div>
                    <div class="flex gap-4 mt-6">
                        <button onclick="mockAddFunds()" class="flex-1 bg-green-600 text-white py-2 rounded">Add Funds</button>
                        <button onclick="mockWithdraw()" class="flex-1 bg-red-600 text-white py-2 rounded">Withdraw</button>
                    </div>
                    <div class="mt-6">
                        <h3 class="font-semibold mb-2">Redeem Gift Code</h3>
                        <div class="flex gap-2">
                            <input id="giftCode" type="text" placeholder="Enter code" class="flex-1 p-2 border rounded">
                            <button onclick="redeemGiftCode()" class="bg-blue-600 text-white px-4 rounded">Redeem</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById("appContent").innerHTML = html;
            window.refreshWallet = () => refreshUserData().then(loadWallet);
            window.mockAddFunds = () => {
                let amount = prompt("Enter amount to add (Ksh):");
                if (amount && !isNaN(amount)) {
                    // Simulate deposit (real integration would use payment gateway)
                    updateDoc(doc(db, "users", currentUser.uid), {
                        availableBalance: increment(Number(amount))
                    }).then(() => refreshUserData().then(loadWallet));
                }
            };
            window.mockWithdraw = () => {
                let amount = prompt("Enter amount to withdraw (Ksh):");
                if (amount && !isNaN(amount) && Number(amount) <= currentUserData.availableBalance) {
                    // Create withdrawal request
                    addDoc(collection(db, "withdrawals"), {
                        userId: currentUser.uid,
                        amount: Number(amount),
                        status: "pending",
                        createdAt: serverTimestamp()
                    }).then(() => {
                        updateDoc(doc(db, "users", currentUser.uid), {
                            availableBalance: increment(-Number(amount)),
                            pendingBalance: increment(Number(amount))
                        }).then(() => refreshUserData().then(loadWallet));
                    });
                } else {
                    alert("Invalid amount or insufficient balance.");
                }
            };
            window.redeemGiftCode = async () => {
                const code = document.getElementById("giftCode").value.trim();
                if (!code) return;
                const codesRef = collection(db, "giftCodes");
                const q = query(codesRef, where("code", "==", code), where("status", "==", "active"));
                const snapshot = await getDocs(q);
                if (snapshot.empty) {
                    alert("Invalid or expired code.");
                    return;
                }
                const codeDoc = snapshot.docs[0];
                const codeData = codeDoc.data();
                if (codeData.expiryDate && codeData.expiryDate.toDate() < new Date()) {
                    alert("Code expired.");
                    return;
                }
                if (codeData.maxUses && codeData.usedCount >= codeData.maxUses) {
                    alert("Code already used max times.");
                    return;
                }
                await runTransaction(db, async (transaction) => {
                    transaction.update(doc(db, "users", currentUser.uid), {
                        availableBalance: increment(codeData.amount)
                    });
                    transaction.update(codeDoc.ref, {
                        usedCount: increment(1)
                    });
                    if (codeData.maxUses && codeData.usedCount + 1 >= codeData.maxUses) {
                        transaction.update(codeDoc.ref, { status: "expired" });
                    }
                    const redeemedRef = doc(collection(db, "redeemedCodes"));
                    transaction.set(redeemedRef, {
                        userId: currentUser.uid,
                        codeId: codeDoc.id,
                        redeemedAt: serverTimestamp()
                    });
                });
                alert(`Redeemed ${formatMoney(codeData.amount)}!`);
                refreshUserData().then(loadWallet);
            };
        }

        async function refreshUserData() {
            const userDoc = await getDoc(doc(db, "users", currentUser.uid));
            currentUserData = userDoc.data();
            // Update totalBalance as available + pending
            currentUserData.totalBalance = currentUserData.availableBalance + currentUserData.pendingBalance;
        }

        function setActiveTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active', 'text-blue-600'));
            const activeLink = document.querySelector(`[data-tab="${tab}"]`);
            if (activeLink) {
                activeLink.classList.add('active', 'text-blue-600');
            }
            switch (tab) {
                case 'dashboard': loadDashboard(); break;
                case 'products': loadProducts(); break;
                case 'subscriptions': loadSubscriptions(); break;
                case 'profile': loadProfile(); break;
                case 'wallet': loadWallet(); break;
            }
        }

        // Initialize
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (!userDoc.exists()) {
                    // Should not happen if registration was used
                    alert("User profile not found. Please register first.");
                    signOut(auth);
                    window.location.href = "registration.html";
                    return;
                }
                currentUserData = userDoc.data();
                if (currentUserData.role === "admin") {
                    window.location.href = "admin-dashboard.html";
                    return;
                }
                await seedProducts();
                refreshUserData().then(() => setActiveTab('dashboard'));
                // Setup navigation
                document.querySelectorAll('[data-tab]').forEach(el => {
                    el.addEventListener('click', (e) => {
                        e.preventDefault();
                        setActiveTab(el.dataset.tab);
                    });
                });
            } else {
                window.location.href = "registration.html";
            }
        });
    </script>
</body>
</html>
