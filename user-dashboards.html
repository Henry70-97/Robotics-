<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanPay • User Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase Modular SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, getDocs, collection, query, where, orderBy, limit, addDoc, updateDoc, runTransaction, Timestamp, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDm-PeCeRdlx6TKPEvKNdT93lMqb5D5O20",
            authDomain: "urbanpay-c5aee.firebaseapp.com",
            projectId: "urbanpay-c5aee",
            storageBucket: "urbanpay-c5aee.firebasestorage.app",
            messagingSenderId: "648155825006",
            appId: "1:648155825006:web:16d6ea4dfab808920b777f",
            measurementId: "G-CTKZN6VHPS"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let userData = null;

        // DOM elements
        const balanceEl = document.getElementById('balance');
        const totalInvestedEl = document.getElementById('totalInvested');
        const totalProfitEl = document.getElementById('totalProfit');
        const plansContainer = document.getElementById('plansContainer');
        const activeInvestmentsContainer = document.getElementById('activeInvestments');
        const transactionsContainer = document.getElementById('transactions');
        const withdrawalForm = document.getElementById('withdrawalForm');
        const messageBox = document.getElementById('messageBox');

        function showMessage(msg, isError = false) {
            messageBox.innerHTML = `<div class="p-3 rounded-lg ${isError ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}">${msg}</div>`;
            setTimeout(() => messageBox.innerHTML = '', 4000);
        }

        // Logout
        window.logout = async () => {
            await signOut(auth);
            window.location.href = "register.html";
        };

        // Fetch user data and check suspension
        async function loadUserData() {
            if (!currentUser) return;
            const userRef = doc(db, "users", currentUser.uid);
            const snap = await getDoc(userRef);
            if (snap.exists()) {
                userData = snap.data();
                balanceEl.textContent = `$${userData.balance.toFixed(2)}`;
                totalInvestedEl.textContent = `$${userData.totalInvested.toFixed(2)}`;
                totalProfitEl.textContent = `$${userData.totalProfit.toFixed(2)}`;
                if (userData.status === 'suspended') {
                    showMessage("Your account is suspended. You cannot invest or withdraw.", true);
                    document.getElementById('investSection').style.opacity = '0.5';
                    document.getElementById('withdrawSection').style.opacity = '0.5';
                    document.querySelectorAll('#investSection button, #withdrawSection button').forEach(btn => btn.disabled = true);
                } else {
                    document.getElementById('investSection').style.opacity = '1';
                    document.getElementById('withdrawSection').style.opacity = '1';
                }
            }
        }

        // Load active investment plans
        async function loadPlans() {
            const q = query(collection(db, "plans"), where("status", "==", "active"));
            const querySnapshot = await getDocs(q);
            plansContainer.innerHTML = '';
            if (querySnapshot.empty) {
                plansContainer.innerHTML = '<div class="col-span-full text-gray-500">No active plans available.</div>';
                return;
            }
            querySnapshot.forEach(doc => {
                const plan = doc.data();
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-xl shadow hover:shadow-md transition";
                card.innerHTML = `
                    <h3 class="font-bold text-lg">${plan.name}</h3>
                    <p class="text-sm text-gray-600">${plan.description || ''}</p>
                    <p class="text-indigo-600 font-semibold mt-2">${plan.dailyProfit}% daily</p>
                    <p class="text-sm">Min: $${plan.minAmount} | Max: $${plan.maxAmount}</p>
                    <p class="text-sm">Duration: ${plan.duration} days</p>
                    <button onclick="showInvestModal('${doc.id}', ${plan.minAmount}, ${plan.maxAmount}, ${plan.dailyProfit}, ${plan.duration})" 
                        class="mt-3 w-full bg-indigo-600 text-white py-1 rounded-lg hover:bg-indigo-700">Invest</button>
                `;
                plansContainer.appendChild(card);
            });
        }

        window.showInvestModal = (planId, minAmount, maxAmount, dailyProfit, duration) => {
            const modal = document.getElementById('investModal');
            document.getElementById('modalPlanId').value = planId;
            document.getElementById('modalMin').innerText = minAmount;
            document.getElementById('modalMax').innerText = maxAmount;
            document.getElementById('investAmount').value = '';
            document.getElementById('investAmount').min = minAmount;
            document.getElementById('investAmount').max = maxAmount;
            modal.classList.remove('hidden');
        };

        window.closeModal = () => {
            document.getElementById('investModal').classList.add('hidden');
        };

        window.submitInvestment = async () => {
            const planId = document.getElementById('modalPlanId').value;
            const amount = parseFloat(document.getElementById('investAmount').value);
            if (isNaN(amount)) return showMessage("Enter a valid amount", true);

            // Fetch plan details
            const planRef = doc(db, "plans", planId);
            const planSnap = await getDoc(planRef);
            if (!planSnap.exists()) return showMessage("Plan not found", true);
            const plan = planSnap.data();
            if (amount < plan.minAmount || amount > plan.maxAmount) {
                return showMessage(`Amount must be between $${plan.minAmount} and $${plan.maxAmount}`, true);
            }
            if (userData.balance < amount) {
                return showMessage("Insufficient balance", true);
            }

            const userRef = doc(db, "users", currentUser.uid);
            const startDate = new Date();
            const endDate = new Date(startDate);
            endDate.setDate(endDate.getDate() + plan.duration);
            const expectedProfit = (amount * plan.dailyProfit / 100) * plan.duration;

            try {
                await runTransaction(db, async (transaction) => {
                    const userSnap = await transaction.get(userRef);
                    if (!userSnap.exists()) throw new Error("User not found");
                    const currentBalance = userSnap.data().balance;
                    if (currentBalance < amount) throw new Error("Insufficient balance");

                    // Deduct balance, update totalInvested
                    transaction.update(userRef, {
                        balance: currentBalance - amount,
                        totalInvested: (userSnap.data().totalInvested || 0) + amount
                    });

                    // Create investment doc
                    const investmentRef = doc(collection(db, "investments"));
                    transaction.set(investmentRef, {
                        userId: currentUser.uid,
                        planId: planId,
                        planName: plan.name,
                        amount: amount,
                        dailyProfit: plan.dailyProfit,
                        duration: plan.duration,
                        startDate: Timestamp.fromDate(startDate),
                        endDate: Timestamp.fromDate(endDate),
                        profitEarned: 0,
                        createdAt: serverTimestamp()
                    });

                    // Create transaction record
                    const transRef = doc(collection(db, "transactions"));
                    transaction.set(transRef, {
                        userId: currentUser.uid,
                        type: 'investment',
                        amount: amount,
                        status: 'completed',
                        description: `Invested in ${plan.name}`,
                        createdAt: serverTimestamp()
                    });
                });
                showMessage("Investment successful!");
                closeModal();
                // Refresh data
                await loadUserData();
                await loadActiveInvestments();
                await loadTransactions();
            } catch (err) {
                showMessage(err.message, true);
            }
        };

        // Load active investments (endDate > now)
        async function loadActiveInvestments() {
            const now = new Date();
            const q = query(
                collection(db, "investments"),
                where("userId", "==", currentUser.uid),
                where("endDate", ">", Timestamp.fromDate(now)),
                orderBy("startDate", "desc")
            );
            const snap = await getDocs(q);
            activeInvestmentsContainer.innerHTML = '';
            if (snap.empty) {
                activeInvestmentsContainer.innerHTML = '<div class="text-gray-500">No active investments</div>';
                return;
            }
            snap.forEach(doc => {
                const inv = doc.data();
                const start = inv.startDate.toDate();
                const end = inv.endDate.toDate();
                const daysActive = Math.max(0, Math.floor((now - start) / (1000 * 60 * 60 * 24)));
                const profitSoFar = (inv.amount * inv.dailyProfit / 100) * daysActive;
                const dailyEarn = (inv.amount * inv.dailyProfit / 100).toFixed(2);
                const card = document.createElement('div');
                card.className = "border p-3 rounded-lg bg-gray-50";
                card.innerHTML = `
                    <div class="flex justify-between"><span class="font-semibold">${inv.planName}</span><span>$${inv.amount}</span></div>
                    <div class="text-sm text-gray-600">Start: ${start.toLocaleDateString()} | End: ${end.toLocaleDateString()}</div>
                    <div class="text-sm text-green-600">Daily profit: $${dailyEarn} | Earned so far: $${profitSoFar.toFixed(2)}</div>
                `;
                activeInvestmentsContainer.appendChild(card);
            });
        }

        // Load recent transactions
        async function loadTransactions() {
            const q = query(
                collection(db, "transactions"),
                where("userId", "==", currentUser.uid),
                orderBy("createdAt", "desc"),
                limit(10)
            );
            const snap = await getDocs(q);
            transactionsContainer.innerHTML = '';
            if (snap.empty) {
                transactionsContainer.innerHTML = '<div class="text-gray-500">No transactions yet</div>';
                return;
            }
            snap.forEach(doc => {
                const t = doc.data();
                const date = t.createdAt ? t.createdAt.toDate().toLocaleString() : 'Just now';
                const row = document.createElement('div');
                row.className = "flex justify-between border-b py-2";
                row.innerHTML = `
                    <span>${t.type}</span>
                    <span class="${t.type === 'investment' ? 'text-red-600' : 'text-green-600'}">$${t.amount}</span>
                    <span class="text-xs text-gray-500">${date}</span>
                `;
                transactionsContainer.appendChild(row);
            });
        }

        // Withdrawal request
        withdrawalForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (userData.status === 'suspended') return showMessage("Account suspended", true);
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            const method = document.getElementById('withdrawMethod').value;
            const accountDetails = document.getElementById('accountDetails').value;
            if (isNaN(amount) || amount <= 0) return showMessage("Valid amount required", true);
            if (amount > userData.balance) return showMessage("Insufficient balance", true);
            try {
                // Create pending withdrawal (balance not deducted until admin approval)
                await addDoc(collection(db, "withdrawals"), {
                    userId: currentUser.uid,
                    amount: amount,
                    method: method,
                    accountDetails: accountDetails,
                    status: 'pending',
                    createdAt: serverTimestamp()
                });
                showMessage("Withdrawal request submitted. Awaiting admin approval.");
                withdrawalForm.reset();
            } catch (err) {
                showMessage(err.message, true);
            }
        });

        // Auth state listener
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "register.html";
                return;
            }
            currentUser = user;
            await loadUserData();
            await loadPlans();
            await loadActiveInvestments();
            await loadTransactions();
        });
    </script>
</head>
<body class="bg-gray-100">
    <!-- Invest Modal -->
    <div id="investModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl p-6 w-96 max-w-md">
            <h3 class="text-xl font-bold mb-4">Invest in Plan</h3>
            <p class="mb-2">Amount range: $<span id="modalMin">0</span> - $<span id="modalMax">0</span></p>
            <input type="number" id="investAmount" step="0.01" class="w-full border rounded p-2 mb-4" placeholder="Enter amount">
            <input type="hidden" id="modalPlanId">
            <div class="flex justify-end gap-2">
                <button onclick="closeModal()" class="px-4 py-2 bg-gray-300 rounded">Cancel</button>
                <button onclick="submitInvestment()" class="px-4 py-2 bg-indigo-600 text-white rounded">Invest</button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto p-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">User Dashboard</h1>
            <button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700">Logout</button>
        </div>
        <div id="messageBox" class="mb-4"></div>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-md"><h2 class="text-gray-500">Current Balance</h2><p id="balance" class="text-3xl font-bold">$0.00</p></div>
            <div class="bg-white p-6 rounded-xl shadow-md"><h2 class="text-gray-500">Total Invested</h2><p id="totalInvested" class="text-3xl font-bold">$0.00</p></div>
            <div class="bg-white p-6 rounded-xl shadow-md"><h2 class="text-gray-500">Total Profit</h2><p id="totalProfit" class="text-3xl font-bold">$0.00</p></div>
        </div>

        <!-- Investment Plans -->
        <div id="investSection" class="bg-white p-6 rounded-xl shadow-md mb-8">
            <h2 class="text-2xl font-semibold mb-4">Active Investment Plans</h2>
            <div id="plansContainer" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </div>

        <!-- Active Investments & Transactions Row -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-md">
                <h2 class="text-xl font-semibold mb-3">Active Investments</h2>
                <div id="activeInvestments" class="space-y-3"></div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-md">
                <h2 class="text-xl font-semibold mb-3">Recent Transactions</h2>
                <div id="transactions" class="space-y-2"></div>
            </div>
        </div>

        <!-- Withdrawal Request -->
        <div id="withdrawSection" class="bg-white p-6 rounded-xl shadow-md">
            <h2 class="text-xl font-semibold mb-4">Request Withdrawal</h2>
            <form id="withdrawalForm" class="space-y-4">
                <div><input type="number" id="withdrawAmount" step="0.01" class="w-full border rounded p-2" placeholder="Amount ($)" required></div>
                <div><select id="withdrawMethod" class="w-full border rounded p-2" required><option value="Mpesa">Mpesa</option><option value="Bank Transfer">Bank Transfer</option><option value="Crypto">Crypto</option></select></div>
                <div><textarea id="accountDetails" rows="2" class="w-full border rounded p-2" placeholder="Account details (phone / bank / wallet address)" required></textarea></div>
                <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700">Submit Request</button>
            </form>
        </div>
    </div>
</body>
</html>
