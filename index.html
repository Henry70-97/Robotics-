<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanDollar - Login / Register</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #f9fafb; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #6366f1; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; margin-left: 8px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1f2937; color: white; padding: 12px 24px; border-radius: 8px; z-index: 1000; font-size: 14px; }
        .toast.error { background: #dc2626; }
        .toast.success { background: #10b981; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8">
        <div class="text-center mb-8">
            <div class="w-20 h-20 mx-auto rounded-full gradient-bg flex items-center justify-center text-3xl mb-4">
                💰
            </div>
            <h1 class="text-3xl font-bold text-gray-800">UrbanDollar</h1>
            <p class="text-gray-500 mt-2">Invest and earn daily returns</p>
        </div>

        <div class="flex gap-4 border-b mb-6">
            <button id="loginTabBtn" class="flex-1 py-2 text-indigo-600 border-b-2 border-indigo-600 font-semibold" onclick="showTab('login')">Login</button>
            <button id="registerTabBtn" class="flex-1 py-2 text-gray-500 hover:text-indigo-600" onclick="showTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="loginEmail" class="w-full px-4 py-2 border rounded-lg focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="loginPassword" class="w-full px-4 py-2 border rounded-lg focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <button onclick="handleLogin()" id="loginBtn" class="w-full py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">Login</button>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="hidden space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Full Name</label>
                <input type="text" id="regName" class="w-full px-4 py-2 border rounded-lg">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="regEmail" class="w-full px-4 py-2 border rounded-lg">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="regPassword" class="w-full px-4 py-2 border rounded-lg">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Referral Code (optional)</label>
                <input type="text" id="regRefCode" class="w-full px-4 py-2 border rounded-lg" onblur="fetchReferrerName()">
                <p id="referrerNameDisplay" class="text-xs mt-1 hidden"></p>
            </div>
            <button onclick="handleRegister()" id="registerBtn" class="w-full py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">Create Account</button>
        </div>

        <div class="text-center mt-6 pt-4 border-t border-gray-200">
            <p class="text-sm text-gray-600">
                Already have an account? 
                <button onclick="showTab('login')" class="text-indigo-600 hover:underline font-medium">Login</button>
            </p>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, updateProfile, deleteUser } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDm-PeCeRdlx6TKPEvKNdT93lMqb5D5O20",
            authDomain: "urbanpay-c5aee.firebaseapp.com",
            projectId: "urbanpay-c5aee",
            storageBucket: "urbanpay-c5aee.firebasestorage.app",
            messagingSenderId: "648155825006",
            appId: "1:648155825006:web:16d6ea4dfab808920b777f",
            measurementId: "G-CTKZN6VHPS"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${isError ? 'error' : 'success'}`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 5000);
        }

        function setLoading(buttonId, isLoading) {
            const btn = document.getElementById(buttonId);
            if (!btn) return;
            if (isLoading) {
                btn.disabled = true;
                btn.innerHTML = 'Processing... <span class="loader"></span>';
            } else {
                btn.disabled = false;
                btn.innerHTML = buttonId === 'loginBtn' ? 'Login' : 'Create Account';
            }
        }

        function generateReferralCode() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        // Fetch referrer name from public referralCodes collection (only when user manually enters code)
        window.fetchReferrerName = async function() {
            const refCode = document.getElementById('regRefCode').value.trim().toUpperCase();
            const displayElem = document.getElementById('referrerNameDisplay');
            if (!refCode) {
                displayElem.classList.add('hidden');
                return;
            }
            try {
                const refDoc = await getDoc(doc(db, 'referralCodes', refCode));
                if (refDoc.exists()) {
                    const data = refDoc.data();
                    displayElem.textContent = `👤 Referred by: ${data.displayName}`;
                    displayElem.classList.remove('hidden');
                    displayElem.classList.add('text-green-600');
                } else {
                    displayElem.textContent = '❌ Invalid referral code';
                    displayElem.classList.remove('hidden');
                    displayElem.classList.add('text-red-500');
                }
            } catch (error) {
                console.error("Error fetching referrer:", error);
                displayElem.textContent = 'Error checking referral code';
                displayElem.classList.remove('hidden');
                displayElem.classList.add('text-red-500');
            }
        };

        window.showTab = function(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginTab = document.getElementById('loginTabBtn');
            const registerTab = document.getElementById('registerTabBtn');
            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                loginTab.classList.add('border-b-2', 'border-indigo-600', 'text-indigo-600');
                loginTab.classList.remove('text-gray-500');
                registerTab.classList.remove('border-b-2', 'border-indigo-600', 'text-indigo-600');
                registerTab.classList.add('text-gray-500');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                registerTab.classList.add('border-b-2', 'border-indigo-600', 'text-indigo-600');
                registerTab.classList.remove('text-gray-500');
                loginTab.classList.remove('border-b-2', 'border-indigo-600', 'text-indigo-600');
                loginTab.classList.add('text-gray-500');
                // Clear referral display when switching to register tab
                document.getElementById('referrerNameDisplay').classList.add('hidden');
            }
        };

        window.handleLogin = async function() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) {
                showToast('Please enter email and password', true);
                return;
            }
            setLoading('loginBtn', true);
            try {
                const userCred = await signInWithEmailAndPassword(auth, email, password);
                const userDoc = await getDoc(doc(db, 'users', userCred.user.uid));
                if (userDoc.exists()) {
                    const role = userDoc.data().role;
                    window.location.href = role === 'admin' ? 'admin-dashboards.html' : 'user-dashboards.html';
                } else {
                    await deleteUser(userCred.user);
                    showToast('User data missing. Please register again.', true);
                }
            } catch (error) {
                console.error("Login error:", error);
                showToast(error.message, true);
            } finally {
                setLoading('loginBtn', false);
            }
        };

        window.handleRegister = async function() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const refCode = document.getElementById('regRefCode').value.trim().toUpperCase();

            if (!name || !email || !password) {
                showToast('Please fill all fields', true);
                return;
            }

            setLoading('registerBtn', true);
            console.log("Starting registration for", email);

            try {
                // 1. Create auth user
                console.log("Creating auth user...");
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                const uid = userCred.user.uid;
                console.log("Auth user created:", uid);

                // 2. Check referral code (only if user entered one)
                let referredBy = null;
                if (refCode) {
                    console.log("Checking referral code:", refCode);
                    const refDoc = await getDoc(doc(db, 'referralCodes', refCode));
                    if (refDoc.exists()) {
                        referredBy = refDoc.data().userId;
                        console.log("Referral found:", referredBy);
                    } else {
                        console.log("Referral code invalid, proceeding without referral");
                    }
                }

                // 3. Create user document in Firestore
                const referralCode = generateReferralCode();
                console.log("Creating user document...");
                await setDoc(doc(db, 'users', uid), {
                    email,
                    displayName: name,
                    referralCode,
                    referredBy: referredBy || null,
                    totalBalance: 0,
                    availableBalance: 0,
                    pendingBalance: 0,
                    totalInvested: 0,
                    totalReturns: 0,
                    totalWithdrawn: 0,
                    activePackagesCount: 0,
                    referralBonus: 0,
                    dailyTaskCommission: 0,
                    role: 'user',
                    status: 'active',
                    createdAt: new Date()
                });
                console.log("User document created");

                // 4. Create referralCodes entry for this user
                console.log("Creating referral code entry...");
                await setDoc(doc(db, 'referralCodes', referralCode), {
                    userId: uid,
                    displayName: name,
                    createdAt: new Date()
                });
                console.log("Referral code entry created");

                // 5. Update auth profile
                await updateProfile(userCred.user, { displayName: name });
                console.log("Profile updated");

                showToast('Account created successfully! Redirecting...');
                setTimeout(() => {
                    window.location.href = 'user-dashboards.html';
                }, 1500);
            } catch (error) {
                console.error("Registration error:", error);
                // If Firestore failed, delete the auth user to avoid orphaned account
                try {
                    const user = auth.currentUser;
                    if (user) await deleteUser(user);
                    console.log("Auth user deleted due to Firestore failure");
                } catch (e) { console.error("Could not delete auth user:", e); }
                showToast(error.message, true);
                setLoading('registerBtn', false);
            }
        };

        // Redirect if already logged in
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists()) {
                    const role = userDoc.data().role;
                    window.location.href = role === 'admin' ? 'admin-dashboards.html' : 'user-dashboards.html';
                } else {
                    await deleteUser(user);
                }
            }
        });
    </script>
</body>
</html>
