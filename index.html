<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanDollar - Login / Register</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8">
        <div class="text-center mb-8">
            <div class="w-20 h-20 mx-auto rounded-full gradient-bg flex items-center justify-center text-3xl mb-4">
                💰
            </div>
            <h1 class="text-3xl font-bold text-gray-800">UrbanDollar</h1>
            <p class="text-gray-500 mt-2">Invest and earn daily returns</p>
        </div>

        <!-- Tab Buttons -->
        <div class="flex gap-4 border-b mb-6">
            <button id="loginTabBtn" class="flex-1 py-2 text-indigo-600 border-b-2 border-indigo-600 font-semibold" onclick="showTab('login')">Login</button>
            <button id="registerTabBtn" class="flex-1 py-2 text-gray-500 hover:text-indigo-600" onclick="showTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="loginEmail" class="w-full px-4 py-2 border rounded-lg focus:ring-indigo-500 focus:border-indigo-500" placeholder="your@email.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="loginPassword" class="w-full px-4 py-2 border rounded-lg focus:ring-indigo-500 focus:border-indigo-500" placeholder="••••••••">
            </div>
            <button onclick="handleLogin()" class="w-full py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">Login</button>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="hidden space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Full Name</label>
                <input type="text" id="regName" class="w-full px-4 py-2 border rounded-lg focus:ring-indigo-500 focus:border-indigo-500" placeholder="John Doe">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="regEmail" class="w-full px-4 py-2 border rounded-lg focus:ring-indigo-500 focus:border-indigo-500" placeholder="your@email.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="regPassword" class="w-full px-4 py-2 border rounded-lg focus:ring-indigo-500 focus:border-indigo-500" placeholder="••••••••">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Referral Code (optional)</label>
                <input type="text" id="regRefCode" class="w-full px-4 py-2 border rounded-lg focus:ring-indigo-500 focus:border-indigo-500" placeholder="XXXXXX">
            </div>
            <button onclick="handleRegister()" class="w-full py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">Create Account</button>
        </div>

        <p id="message" class="text-center text-sm mt-4 hidden"></p>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDm-PeCeRdlx6TKPEvKNdT93lMqb5D5O20",
            authDomain: "urbanpay-c5aee.firebaseapp.com",
            projectId: "urbanpay-c5aee",
            storageBucket: "urbanpay-c5aee.firebasestorage.app",
            messagingSenderId: "648155825006",
            appId: "1:648155825006:web:16d6ea4dfab808920b777f",
            measurementId: "G-CTKZN6VHPS"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function showToast(message, isError = false) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = message;
            msgDiv.className = `text-center text-sm mt-4 ${isError ? 'text-red-600' : 'text-green-600'}`;
            msgDiv.classList.remove('hidden');
            setTimeout(() => msgDiv.classList.add('hidden'), 3000);
        }

        function generateReferralCode() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        window.showTab = function(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginTab = document.getElementById('loginTabBtn');
            const registerTab = document.getElementById('registerTabBtn');
            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                loginTab.classList.add('border-b-2', 'border-indigo-600', 'text-indigo-600');
                loginTab.classList.remove('text-gray-500');
                registerTab.classList.remove('border-b-2', 'border-indigo-600', 'text-indigo-600');
                registerTab.classList.add('text-gray-500');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                registerTab.classList.add('border-b-2', 'border-indigo-600', 'text-indigo-600');
                registerTab.classList.remove('text-gray-500');
                loginTab.classList.remove('border-b-2', 'border-indigo-600', 'text-indigo-600');
                loginTab.classList.add('text-gray-500');
            }
        };

        window.handleLogin = async function() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                const userCred = await signInWithEmailAndPassword(auth, email, password);
                // Check role in Firestore
                const userDoc = await getDoc(doc(db, 'users', userCred.user.uid));
                if (userDoc.exists()) {
                    const role = userDoc.data().role;
                    if (role === 'admin') {
                        window.location.href = 'admin-dashboards.html';
                    } else {
                        window.location.href = 'user-dashboards.html';
                    }
                } else {
                    showToast('User data missing', true);
                    await auth.signOut();
                }
            } catch (error) {
                showToast(error.message, true);
            }
        };

        window.handleRegister = async function() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const refCode = document.getElementById('regRefCode').value.trim().toUpperCase();

            if (!name || !email || !password) {
                showToast('Please fill all fields', true);
                return;
            }

            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                const uid = userCred.user.uid;
                const referralCode = generateReferralCode();
                let referredBy = null;

                if (refCode) {
                    const usersRef = collection(db, 'users');
                    const q = query(usersRef, where('referralCode', '==', refCode));
                    const querySnapshot = await getDocs(q);
                    if (!querySnapshot.empty) {
                        referredBy = querySnapshot.docs[0].id;
                    }
                }

                await setDoc(doc(db, 'users', uid), {
                    email: email,
                    displayName: name,
                    referralCode: referralCode,
                    referredBy: referredBy || null,
                    totalBalance: 0,
                    availableBalance: 0,
                    pendingBalance: 0,
                    totalInvested: 0,
                    totalReturns: 0,
                    totalWithdrawn: 0,
                    activePackagesCount: 0,
                    referralBonus: 0,
                    dailyTaskCommission: 0,
                    role: 'user',
                    createdAt: new Date()
                });

                await updateProfile(userCred.user, { displayName: name });
                showToast('Account created successfully! Redirecting...');
                setTimeout(() => {
                    window.location.href = 'user-dashboards.html';
                }, 1500);
            } catch (error) {
                showToast(error.message, true);
            }
        };

        // If user is already logged in, redirect immediately
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists()) {
                    const role = userDoc.data().role;
                    if (role === 'admin') {
                        window.location.href = 'admin-dashboards.html';
                    } else {
                        window.location.href = 'user-dashboards.html';
                    }
                } else {
                    await auth.signOut();
                }
            }
        });
    </script>
</body>
</html>
