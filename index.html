<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register / Login | Investment Platform</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.2/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.2/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.2/firebase-firestore.js";

        // Your Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDm-PeCeRdlx6TKPEvKNdT93lMqb5D5O20",
            authDomain: "urbanpay-c5aee.firebaseapp.com",
            projectId: "urbanpay-c5aee",
            storageBucket: "urbanpay-c5aee.firebasestorage.app",
            messagingSenderId: "648155825006",
            appId: "1:648155825006:web:16d6ea4dfab808920b777f",
            measurementId: "G-CTKZN6VHPS"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // DOM elements
        const googleBtn = document.getElementById('googleSignIn');
        const emailSignupBtn = document.getElementById('emailSignup');
        const emailSigninBtn = document.getElementById('emailSignin');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const showPasswordCheckbox = document.getElementById('showPassword');
        const messageDiv = document.getElementById('message');

        // Show password toggle
        showPasswordCheckbox.addEventListener('change', (e) => {
            passwordInput.type = e.target.checked ? 'text' : 'password';
        });

        // Helper: Create/update user document in Firestore
        async function ensureUserDocument(user, role = 'user') {
            const userRef = doc(db, 'users', user.uid);
            const userSnap = await getDoc(userRef);
            if (!userSnap.exists()) {
                await setDoc(userRef, {
                    email: user.email,
                    displayName: user.displayName || user.email.split('@')[0],
                    photoURL: user.photoURL || null,
                    balance: 0,
                    totalInvested: 0,
                    totalWithdrawn: 0,
                    totalProfit: 0,
                    status: 'active',
                    role: role,
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp()
                });
            } else {
                // Optionally update last login
                await setDoc(userRef, { updatedAt: serverTimestamp() }, { merge: true });
            }
        }

        // Redirect based on role
        async function redirectToDashboard(user) {
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            const role = userDoc.exists() ? userDoc.data().role : 'user';
            window.location.href = role === 'admin' ? 'admin-dashboards.html' : 'user-dashboards.html';
        }

        // Google Sign-In
        googleBtn.addEventListener('click', async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                await ensureUserDocument(user, 'user'); // new users get role 'user'
                await redirectToDashboard(user);
            } catch (error) {
                messageDiv.innerText = 'Google Sign-In failed: ' + error.message;
            }
        });

        // Email Sign-Up
        emailSignupBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            if (!email || !password) {
                messageDiv.innerText = 'Please enter email and password.';
                return;
            }
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                await ensureUserDocument(user, 'user');
                await redirectToDashboard(user);
            } catch (error) {
                messageDiv.innerText = 'Sign-up failed: ' + error.message;
            }
        });

        // Email Sign-In
        emailSigninBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            if (!email || !password) {
                messageDiv.innerText = 'Please enter email and password.';
                return;
            }
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                await redirectToDashboard(user);
            } catch (error) {
                messageDiv.innerText = 'Sign-in failed: ' + error.message;
            }
        });

        // If already logged in, go to dashboard
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await redirectToDashboard(user);
            }
        });
    </script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold text-center mb-6">Investment Platform</h1>
        <div class="space-y-4">
            <button id="googleSignIn" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">
                Sign in with Google
            </button>
            <div class="relative my-4">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-300"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="bg-white px-2 text-gray-500">Or use email</span>
                </div>
            </div>
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="email" class="mt-1 w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="password" class="mt-1 w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                <div class="mt-1 flex items-center">
                    <input type="checkbox" id="showPassword" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                    <label for="showPassword" class="ml-2 text-sm text-gray-600">Show password</label>
                </div>
            </div>
            <div class="flex space-x-3">
                <button id="emailSignup" class="flex-1 bg-green-600 text-white py-2 rounded hover:bg-green-700 transition">Sign Up</button>
                <button id="emailSignin" class="flex-1 bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">Sign In</button>
            </div>
            <div id="message" class="text-red-500 text-sm text-center mt-2"></div>
        </div>
    </div>
</body>
</html>
