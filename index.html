<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanDollar - Login / Register</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #6366f1; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; margin-left: 8px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8">
        <div class="text-center mb-8">
            <div class="w-20 h-20 mx-auto rounded-full gradient-bg flex items-center justify-center text-3xl mb-4">
                💰
            </div>
            <h1 class="text-3xl font-bold text-gray-800">UrbanDollar</h1>
            <p class="text-gray-500 mt-2">Invest and earn daily returns</p>
        </div>

        <!-- Tab Buttons -->
        <div class="flex gap-4 border-b mb-6">
            <button id="loginTabBtn" class="flex-1 py-2 text-indigo-600 border-b-2 border-indigo-600 font-semibold" onclick="showTab('login')">Login</button>
            <button id="registerTabBtn" class="flex-1 py-2 text-gray-500 hover:text-indigo-600" onclick="showTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="loginEmail" class="w-full px-4 py-2 border rounded-lg focus:ring-indigo-500 focus:border-indigo-500" placeholder="your@email.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="loginPassword" class="w-full px-4 py-2 border rounded-lg focus:ring-indigo-500 focus:border-indigo-500" placeholder="••••••••">
            </div>
            <button onclick="handleLogin()" id="loginBtn" class="w-full py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">Login</button>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="hidden space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Full Name</label>
                <input type="text" id="regName" class="w-full px-4 py-2 border rounded-lg focus:ring-indigo-500 focus:border-indigo-500" placeholder="John Doe">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="regEmail" class="w-full px-4 py-2 border rounded-lg focus:ring-indigo-500 focus:border-indigo-500" placeholder="your@email.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="regPassword" class="w-full px-4 py-2 border rounded-lg focus:ring-indigo-500 focus:border-indigo-500" placeholder="••••••••">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Referral Code (optional)</label>
                <input type="text" id="regRefCode" class="w-full px-4 py-2 border rounded-lg focus:ring-indigo-500 focus:border-indigo-500" placeholder="XXXXXX" onblur="fetchReferrerName()">
                <p id="referrerNameDisplay" class="text-xs mt-1 hidden"></p>
            </div>
            <button onclick="handleRegister()" id="registerBtn" class="w-full py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">Create Account</button>
        </div>

        <!-- Footer with Login Link -->
        <div class="text-center mt-6 pt-4 border-t border-gray-200">
            <p class="text-sm text-gray-600">
                Already have an account? 
                <button onclick="showTab('login')" class="text-indigo-600 hover:underline font-medium">Login</button>
            </p>
        </div>

        <p id="message" class="text-center text-sm mt-4 hidden"></p>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, updateProfile, deleteUser } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDm-PeCeRdlx6TKPEvKNdT93lMqb5D5O20",
            authDomain: "urbanpay-c5aee.firebaseapp.com",
            projectId: "urbanpay-c5aee",
            storageBucket: "urbanpay-c5aee.firebasestorage.app",
            messagingSenderId: "648155825006",
            appId: "1:648155825006:web:16d6ea4dfab808920b777f",
            measurementId: "G-CTKZN6VHPS"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function showToast(message, isError = false) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = message;
            msgDiv.className = `text-center text-sm mt-4 ${isError ? 'text-red-600' : 'text-green-600'}`;
            msgDiv.classList.remove('hidden');
            setTimeout(() => msgDiv.classList.add('hidden'), 5000);
        }

        function setLoading(buttonId, isLoading) {
            const btn = document.getElementById(buttonId);
            if (!btn) return;
            if (isLoading) {
                btn.disabled = true;
                btn.innerHTML = 'Processing... <span class="loader"></span>';
            } else {
                btn.disabled = false;
                btn.innerHTML = buttonId === 'loginBtn' ? 'Login' : 'Create Account';
            }
        }

        function generateReferralCode() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        // Fetch referrer name from referralCodes collection (publicly readable)
        window.fetchReferrerName = async function() {
            const refCode = document.getElementById('regRefCode').value.trim().toUpperCase();
            const displayElem = document.getElementById('referrerNameDisplay');
            if (!refCode) {
                displayElem.classList.add('hidden');
                return;
            }
            try {
                const refDoc = await getDoc(doc(db, 'referralCodes', refCode));
                if (refDoc.exists()) {
                    const data = refDoc.data();
                    displayElem.textContent = `👤 Referred by: ${data.displayName}`;
                    displayElem.classList.remove('hidden');
                    displayElem.classList.add('text-green-600');
                } else {
                    displayElem.textContent = '❌ Invalid referral code';
                    displayElem.classList.remove('hidden');
                    displayElem.classList.add('text-red-500');
                }
            } catch (error) {
                console.error(error);
                displayElem.textContent = 'Error checking referral code';
                displayElem.classList.remove('hidden');
                displayElem.classList.add('text-red-500');
            }
        };

        window.showTab = function(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginTab = document.getElementById('loginTabBtn');
            const registerTab = document.getElementById('registerTabBtn');
            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                loginTab.classList.add('border-b-2', 'border-indigo-600', 'text-indigo-600');
                loginTab.classList.remove('text-gray-500');
                registerTab.classList.remove('border-b-2', 'border-indigo-600', 'text-indigo-600');
                registerTab.classList.add('text-gray-500');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                registerTab.classList.add('border-b-2', 'border-indigo-600', 'text-indigo-600');
                registerTab.classList.remove('text-gray-500');
                loginTab.classList.remove('border-b-2', 'border-indigo-600', 'text-indigo-600');
                loginTab.classList.add('text-gray-500');
                // Clear referral name display when switching to register tab
                document.getElementById('referrerNameDisplay').classList.add('hidden');
            }
        };

        window.handleLogin = async function() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) {
                showToast('Please enter email and password', true);
                return;
            }
            setLoading('loginBtn', true);
            try {
                const userCred = await signInWithEmailAndPassword(auth, email, password);
                const userDoc = await getDoc(doc(db, 'users', userCred.user.uid));
                if (userDoc.exists()) {
                    const role = userDoc.data().role;
                    if (role === 'admin') {
                        window.location.href = 'admin-dashboards.html';
                    } else {
                        window.location.href = 'user-dashboards.html';
                    }
                } else {
                    // User document missing – delete auth user and prompt registration
                    await deleteUser(userCred.user);
                    showToast('User data missing. Please register again.', true);
                    setLoading('loginBtn', false);
                }
            } catch (error) {
                showToast(error.message, true);
                setLoading('loginBtn', false);
            }
        };

        window.handleRegister = async function() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const refCode = document.getElementById('regRefCode').value.trim().toUpperCase();

            if (!name || !email || !password) {
                showToast('Please fill all fields', true);
                return;
            }

            setLoading('registerBtn', true);
            try {
                // Create auth user
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                const uid = userCred.user.uid;
                const referralCode = generateReferralCode();
                let referredBy = null;

                // Check referral code (if provided)
                if (refCode) {
                    const refDoc = await getDoc(doc(db, 'referralCodes', refCode));
                    if (refDoc.exists()) {
                        referredBy = refDoc.data().userId;
                    }
                }

                // Create user document
                await setDoc(doc(db, 'users', uid), {
                    email: email,
                    displayName: name,
                    referralCode: referralCode,
                    referredBy: referredBy || null,
                    totalBalance: 0,
                    availableBalance: 0,
                    pendingBalance: 0,
                    totalInvested: 0,
                    totalReturns: 0,
                    totalWithdrawn: 0,
                    activePackagesCount: 0,
                    referralBonus: 0,
                    dailyTaskCommission: 0,
                    role: 'user',
                    status: 'active',
                    createdAt: new Date()
                });

                // Create referralCodes document for this user
                await setDoc(doc(db, 'referralCodes', referralCode), {
                    userId: uid,
                    displayName: name,
                    createdAt: new Date()
                });

                // Update auth profile
                await updateProfile(userCred.user, { displayName: name });

                showToast('Account created successfully! Redirecting...');
                setTimeout(() => {
                    window.location.href = 'user-dashboards.html';
                }, 1500);
            } catch (error) {
                // If Firestore fails, delete the auth user to avoid orphaned accounts
                try {
                    const user = auth.currentUser;
                    if (user) await deleteUser(user);
                } catch (e) { console.error('Failed to delete user', e); }
                showToast(error.message, true);
                setLoading('registerBtn', false);
            }
        };

        // Auto-fetch referral code from URL and pre-fill
        function autoFillReferralCode() {
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref');
            if (refCode) {
                const refInput = document.getElementById('regRefCode');
                if (refInput) {
                    refInput.value = refCode.toUpperCase();
                    fetchReferrerName();
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            autoFillReferralCode();
        });

        // Redirect if already logged in
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists()) {
                    const role = userDoc.data().role;
                    if (role === 'admin') {
                        window.location.href = 'admin-dashboards.html';
                    } else {
                        window.location.href = 'user-dashboards.html';
                    }
                } else {
                    // User document missing – delete auth user
                    await deleteUser(user);
                }
            }
        });
    </script>
</body>
</html>
