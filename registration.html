<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartHustle AI – Register</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <style>
    body { background: #0a0e1a; font-family: 'DM Sans', sans-serif; color: #ccd6f6; }
    .bg-surface { background: #131829; }
    .text-accent { color: #00e5a0; }
    .border-accent { border-color: #00e5a0; }
    .bg-accent { background: #00e5a0; }
    .hover\:bg-accentDim:hover { background: #00c98b; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-surface rounded-2xl p-8 border border-white/10 shadow-xl">
    <div class="text-center mb-6">
      <div class="inline-flex items-center gap-2 bg-accent/10 rounded-full px-4 py-1 text-accent text-sm mb-4">
        <i data-lucide="zap" class="w-4 h-4"></i> SmartHustle AI
      </div>
      <h1 class="font-heading text-2xl font-bold">Create Your Account</h1>
      <p class="text-slate text-sm mt-1">Join the future of freelancing</p>
    </div>

    <form id="signupForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1">Full Name</label>
        <input id="name" type="text" required class="w-full px-4 py-3 rounded-xl bg-midnight border border-white/10 text-light placeholder-slate/50 text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Email</label>
        <input id="email" type="email" required class="w-full px-4 py-3 rounded-xl bg-midnight border border-white/10 text-light placeholder-slate/50 text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Phone Number</label>
        <input id="phone" type="tel" required class="w-full px-4 py-3 rounded-xl bg-midnight border border-white/10 text-light placeholder-slate/50 text-sm">
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium mb-1">Year of Birth</label>
          <input id="yob" type="number" min="1950" max="2010" required class="w-full px-4 py-3 rounded-xl bg-midnight border border-white/10 text-light placeholder-slate/50 text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Nationality</label>
          <select id="nationality" required class="w-full px-4 py-3 rounded-xl bg-midnight border border-white/10 text-light text-sm">
            <option value="">Select</option>
            <option>Kenya</option><option>Nigeria</option><option>Tanzania</option><option>Uganda</option><option>South Africa</option><option>Ghana</option><option>Other</option>
          </select>
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Password</label>
        <input id="password" type="password" required minlength="6" class="w-full px-4 py-3 rounded-xl bg-midnight border border-white/10 text-light placeholder-slate/50 text-sm">
      </div>
      <button type="submit" class="w-full py-3.5 rounded-xl bg-accent text-midnight font-bold text-base hover:bg-accentDim transition">Sign Up</button>
    </form>

    <div class="mt-6 text-center text-sm text-slate">
      Already have an account? 
      <a href="#" onclick="window.location.href='user_dashboard.html'" class="text-accent hover:underline">Sign In</a>
    </div>
  </div>

  <script>
    // Firebase config (same as provided)
    const firebaseConfig = {
      apiKey: "AIzaSyDm-PeCeRdlx6TKPEvKNdT93lMqb5D5O20",
      authDomain: "urbanpay-c5aee.firebaseapp.com",
      projectId: "urbanpay-c5aee",
      storageBucket: "urbanpay-c5aee.firebasestorage.app",
      messagingSenderId: "648155825006",
      appId: "1:648155825006:web:16d6ea4dfab808920b777f",
      measurementId: "G-CTKZN6VHPS"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const yob = parseInt(document.getElementById('yob').value);
      const nationality = document.getElementById('nationality').value;
      const password = document.getElementById('password').value;

      try {
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        const uid = cred.user.uid;
        await db.collection('users').doc(uid).set({
          uid, name, email, phone, yob, nationality,
          role: 'user',
          status: 'unverified',   // must be activated by admin
          skills: [],
          purchasedTools: [],
          totalEarnings: 0,
          rating: 0,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert('Account created! Please wait for admin approval before you can apply for jobs.');
        window.location.href = 'user_dashboard.html';
      } catch (err) {
        alert(err.message);
      }
    });

    // If already logged in, redirect accordingly
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        const doc = await db.collection('users').doc(user.uid).get();
        if (doc.exists && doc.data().role === 'admin') {
          window.location.href = 'admin_dashboard.html';
        } else {
          window.location.href = 'user_dashboard.html';
        }
      }
    });
  </script>
</body>
</html>
