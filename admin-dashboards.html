<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanPay • Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, getDocs, collection, query, where, orderBy, addDoc, updateDoc, deleteDoc, runTransaction, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDm-PeCeRdlx6TKPEvKNdT93lMqb5D5O20",
            authDomain: "urbanpay-c5aee.firebaseapp.com",
            projectId: "urbanpay-c5aee",
            storageBucket: "urbanpay-c5aee.firebasestorage.app",
            messagingSenderId: "648155825006",
            appId: "1:648155825006:web:16d6ea4dfab808920b777f",
            measurementId: "G-CTKZN6VHPS"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentAdmin = null;

        // DOM elements
        const pendingWithdrawalsDiv = document.getElementById('pendingWithdrawals');
        const usersListDiv = document.getElementById('usersList');
        const plansListDiv = document.getElementById('plansList');
        const messageBox = document.getElementById('messageBox');

        function showMessage(msg, isError = false) {
            messageBox.innerHTML = `<div class="p-3 rounded-lg ${isError ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}">${msg}</div>`;
            setTimeout(() => messageBox.innerHTML = '', 4000);
        }

        window.logout = async () => {
            await signOut(auth);
            window.location.href = "register.html";
        };

        // Check admin role
        async function checkAdmin(user) {
            if (!user) return false;
            const userRef = doc(db, "users", user.uid);
            const snap = await getDoc(userRef);
            if (snap.exists() && snap.data().role === 'admin') return true;
            return false;
        }

        // ---- Pending Withdrawals ----
        async function loadPendingWithdrawals() {
            const q = query(collection(db, "withdrawals"), where("status", "==", "pending"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            pendingWithdrawalsDiv.innerHTML = '';
            if (snap.empty) {
                pendingWithdrawalsDiv.innerHTML = '<div class="text-gray-500">No pending withdrawals</div>';
                return;
            }
            for (const docSnap of snap.docs) {
                const w = docSnap.data();
                const userSnap = await getDoc(doc(db, "users", w.userId));
                const userEmail = userSnap.exists() ? userSnap.data().email : 'Unknown';
                const card = document.createElement('div');
                card.className = "border rounded-lg p-4 mb-3 bg-white shadow-sm";
                card.innerHTML = `
                    <div><span class="font-semibold">User:</span> ${userEmail}</div>
                    <div><span class="font-semibold">Amount:</span> $${w.amount}</div>
                    <div><span class="font-semibold">Method:</span> ${w.method}</div>
                    <div><span class="font-semibold">Details:</span> ${w.accountDetails}</div>
                    <div class="flex gap-2 mt-3">
                        <button onclick="approveWithdrawal('${docSnap.id}', '${w.userId}', ${w.amount})" class="bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700">Approve</button>
                        <button onclick="rejectWithdrawal('${docSnap.id}')" class="bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700">Reject</button>
                    </div>
                `;
                pendingWithdrawalsDiv.appendChild(card);
            }
        }

        window.approveWithdrawal = async (withdrawalId, userId, amount) => {
            try {
                await runTransaction(db, async (transaction) => {
                    const userRef = doc(db, "users", userId);
                    const withdrawalRef = doc(db, "withdrawals", withdrawalId);
                    const userSnap = await transaction.get(userRef);
                    if (!userSnap.exists()) throw new Error("User not found");
                    const user = userSnap.data();
                    if (user.balance < amount) throw new Error("Insufficient balance for approval");

                    // Deduct balance, update totalWithdrawn
                    transaction.update(userRef, {
                        balance: user.balance - amount,
                        totalWithdrawn: (user.totalWithdrawn || 0) + amount
                    });
                    // Mark withdrawal as completed
                    transaction.update(withdrawalRef, { status: 'completed' });
                    // Create transaction record
                    const transRef = doc(collection(db, "transactions"));
                    transaction.set(transRef, {
                        userId: userId,
                        type: 'withdrawal',
                        amount: amount,
                        status: 'completed',
                        description: 'Withdrawal approved',
                        createdAt: serverTimestamp()
                    });
                });
                showMessage("Withdrawal approved successfully");
                loadPendingWithdrawals();
                loadUsers(); // refresh user balance display
            } catch (err) {
                showMessage(err.message, true);
            }
        };

        window.rejectWithdrawal = async (withdrawalId) => {
            try {
                const ref = doc(db, "withdrawals", withdrawalId);
                await updateDoc(ref, { status: 'rejected' });
                showMessage("Withdrawal rejected");
                loadPendingWithdrawals();
            } catch (err) {
                showMessage(err.message, true);
            }
        };

        // ---- Users Management ----
        async function loadUsers() {
            const q = query(collection(db, "users"));
            const snap = await getDocs(q);
            usersListDiv.innerHTML = '';
            snap.forEach(docSnap => {
                const user = docSnap.data();
                const statusColor = user.status === 'active' ? 'text-green-600' : 'text-red-600';
                const row = document.createElement('div');
                row.className = "border-b p-3 flex flex-wrap justify-between items-center";
                row.innerHTML = `
                    <div class="flex-1"><span class="font-medium">${user.email}</span><br><span class="text-sm text-gray-500">Balance: $${user.balance.toFixed(2)} | Role: ${user.role}</span></div>
                    <div class="flex items-center gap-2">
                        <span class="${statusColor} font-semibold">${user.status}</span>
                        <button onclick="toggleUserStatus('${docSnap.id}', '${user.status}')" class="bg-yellow-500 text-white px-3 py-1 rounded text-sm hover:bg-yellow-600">Toggle Status</button>
                    </div>
                `;
                usersListDiv.appendChild(row);
            });
        }

        window.toggleUserStatus = async (userId, currentStatus) => {
            const newStatus = currentStatus === 'active' ? 'suspended' : 'active';
            try {
                await updateDoc(doc(db, "users", userId), { status: newStatus });
                showMessage(`User status updated to ${newStatus}`);
                loadUsers();
            } catch (err) {
                showMessage(err.message, true);
            }
        };

        // ---- Plans Management ----
        async function loadPlans() {
            const snap = await getDocs(collection(db, "plans"));
            plansListDiv.innerHTML = '';
            snap.forEach(docSnap => {
                const plan = docSnap.data();
                const card = document.createElement('div');
                card.className = "border rounded p-3 mb-2 bg-gray-50 flex justify-between items-center";
                card.innerHTML = `
                    <div>
                        <span class="font-bold">${plan.name}</span> - ${plan.dailyProfit}% daily / ${plan.duration} days<br>
                        <span class="text-sm">$${plan.minAmount} – $${plan.maxAmount} | ${plan.status}</span>
                    </div>
                    <button onclick="deletePlan('${docSnap.id}')" class="bg-red-500 text-white px-3 py-1 rounded text-sm">Delete</button>
                `;
                plansListDiv.appendChild(card);
            });
        }

        window.deletePlan = async (planId) => {
            if (confirm("Delete this plan? It may affect active investments.")) {
                try {
                    await deleteDoc(doc(db, "plans", planId));
                    showMessage("Plan deleted");
                    loadPlans();
                } catch (err) {
                    showMessage(err.message, true);
                }
            }
        };

        // Add new plan
        const addPlanForm = document.getElementById('addPlanForm');
        addPlanForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('planName').value;
            const description = document.getElementById('planDesc').value;
            const minAmount = parseFloat(document.getElementById('minAmount').value);
            const maxAmount = parseFloat(document.getElementById('maxAmount').value);
            const duration = parseInt(document.getElementById('duration').value);
            const dailyProfit = parseFloat(document.getElementById('dailyProfit').value);
            const status = document.getElementById('planStatus').value;

            if (isNaN(minAmount) || isNaN(maxAmount) || isNaN(duration) || isNaN(dailyProfit)) {
                return showMessage("All numeric fields required", true);
            }
            try {
                await addDoc(collection(db, "plans"), {
                    name, description, minAmount, maxAmount, duration, dailyProfit, status,
                    createdAt: serverTimestamp()
                });
                showMessage("Plan added successfully");
                addPlanForm.reset();
                loadPlans();
            } catch (err) {
                showMessage(err.message, true);
            }
        });

        // Auth guard
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "register.html";
                return;
            }
            const isAdmin = await checkAdmin(user);
            if (!isAdmin) {
                showMessage("Access denied: Admins only", true);
                setTimeout(() => { window.location.href = "user-dashboards.html"; }, 2000);
                return;
            }
            currentAdmin = user;
            loadPendingWithdrawals();
            loadUsers();
            loadPlans();
        });
    </script>
</head>
<body class="bg-gray-100">
    <div class="max-w-7xl mx-auto p-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">Admin Dashboard</h1>
            <button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700">Logout</button>
        </div>
        <div id="messageBox" class="mb-4"></div>

        <!-- Pending Withdrawals -->
        <div class="bg-white p-6 rounded-xl shadow-md mb-8">
            <h2 class="text-2xl font-semibold mb-4">Pending Withdrawals</h2>
            <div id="pendingWithdrawals"></div>
        </div>

        <!-- Users Management -->
        <div class="bg-white p-6 rounded-xl shadow-md mb-8">
            <h2 class="text-2xl font-semibold mb-4">All Users</h2>
            <div id="usersList"></div>
        </div>

        <!-- Plan Management -->
        <div class="bg-white p-6 rounded-xl shadow-md mb-8">
            <h2 class="text-2xl font-semibold mb-4">Investment Plans</h2>
            <div id="plansList" class="mb-4"></div>
            <h3 class="text-xl font-semibold mt-6 mb-3">Add New Plan</h3>
            <form id="addPlanForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="planName" placeholder="Plan Name" class="border p-2 rounded" required>
                <input type="text" id="planDesc" placeholder="Description" class="border p-2 rounded">
                <input type="number" id="minAmount" step="0.01" placeholder="Min Amount" class="border p-2 rounded" required>
                <input type="number" id="maxAmount" step="0.01" placeholder="Max Amount" class="border p-2 rounded" required>
                <input type="number" id="duration" placeholder="Duration (days)" class="border p-2 rounded" required>
                <input type="number" id="dailyProfit" step="0.01" placeholder="Daily Profit (%)" class="border p-2 rounded" required>
                <select id="planStatus" class="border p-2 rounded">
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
                <button type="submit" class="bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700">Create Plan</button>
            </form>
        </div>
    </div>
</body>
</html>
