<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanDollar | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="w-64 bg-gray-800 text-white flex flex-col">
            <div class="p-4 text-xl font-bold">UrbanDollar Admin</div>
            <nav class="flex-1">
                <a href="#" data-section="users" class="block py-2 px-4 hover:bg-gray-700 transition">👥 Users</a>
                <a href="#" data-section="products" class="block py-2 px-4 hover:bg-gray-700 transition">📦 Products</a>
                <a href="#" data-section="withdrawals" class="block py-2 px-4 hover:bg-gray-700 transition">💰 Withdrawals</a>
                <a href="#" data-section="giftcodes" class="block py-2 px-4 hover:bg-gray-700 transition">🎁 Gift Codes</a>
            </nav>
            <div class="p-4 border-t border-gray-700">
                <button id="logoutBtn" class="w-full bg-red-600 py-2 rounded hover:bg-red-700">Sign Out</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 overflow-auto p-6">
            <div id="adminContent"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
        import { getFirestore, doc, getDoc, getDocs, collection, addDoc, updateDoc, deleteDoc, query, where, orderBy, serverTimestamp, increment, Timestamp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDm-PeCeRdlx6TKPEvKNdT93lMqb5D5O20",
            authDomain: "urbanpay-c5aee.firebaseapp.com",
            projectId: "urbanpay-c5aee",
            storageBucket: "urbanpay-c5aee.firebasestorage.app",
            messagingSenderId: "648155825006",
            appId: "1:648155825006:web:16d6ea4dfab808920b777f",
            measurementId: "G-CTKZN6VHPS"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        // Helper
        function formatMoney(amount) { return `Ksh ${amount.toLocaleString()}`; }

        // Users management
        async function loadUsers() {
            const usersSnapshot = await getDocs(collection(db, "users"));
            let html = `<h2 class="text-2xl font-bold mb-4">Users</h2><div class="bg-white rounded shadow overflow-x-auto"><table class="min-w-full"><thead class="bg-gray-200"><tr><th class="p-2 text-left">Name</th><th>Email</th><th>Balance</th><th>Invested</th><th>Active Pkg</th><th>Actions</th></tr></thead><tbody>`;
            usersSnapshot.forEach(docSnap => {
                const u = docSnap.data();
                html += `<tr class="border-b">
                    <td class="p-2">${u.displayName}</td>
                    <td>${u.email}</td>
                    <td>${formatMoney(u.availableBalance)}</td>
                    <td>${formatMoney(u.totalInvested)}</td>
                    <td>${u.activePackagesCount}</td>
                    <td><button onclick="editUser('${docSnap.id}')" class="bg-blue-500 text-white px-2 py-1 rounded text-sm">Edit</button></td>
                </tr>`;
            });
            html += `</tbody></table></div>`;
            document.getElementById("adminContent").innerHTML = html;
            window.editUser = (userId) => {
                const newBalance = prompt("Enter new available balance (Ksh):");
                if (newBalance !== null) {
                    updateDoc(doc(db, "users", userId), { availableBalance: Number(newBalance) }).then(() => loadUsers());
                }
            };
        }

        // Products management
        async function loadProducts() {
            const productsSnapshot = await getDocs(collection(db, "products"));
            let html = `<h2 class="text-2xl font-bold mb-4">Products</h2><button onclick="showAddProductForm()" class="mb-4 bg-green-600 text-white px-4 py-2 rounded">+ Add Product</button><div class="grid gap-4">`;
            productsSnapshot.forEach(docSnap => {
                const p = docSnap.data();
                html += `<div class="bg-white rounded shadow p-4 flex justify-between items-center">
                    <div>
                        <h3 class="font-bold">${p.name}</h3>
                        <p>Price: ${formatMoney(p.price)} | Duration: ${p.durationDays}d | Daily: ${formatMoney(p.dailyIncome)} | ROI: ${p.roi}%</p>
                        <img src="${p.imageUrl}" class="w-20 h-20 object-cover mt-2">
                    </div>
                    <div>
                        <button onclick="deleteProduct('${docSnap.id}')" class="bg-red-500 text-white px-3 py-1 rounded">Delete</button>
                    </div>
                </div>`;
            });
            html += `</div>`;
            document.getElementById("adminContent").innerHTML = html;
            window.showAddProductForm = () => {
                const name = prompt("Product name:");
                const price = prompt("Price (Ksh):");
                const durationDays = prompt("Duration (days):");
                const dailyIncome = prompt("Daily income (Ksh):");
                const roi = prompt("ROI %:");
                const imageUrl = prompt("Image URL:");
                if (name && price && durationDays && dailyIncome && roi && imageUrl) {
                    addDoc(collection(db, "products"), {
                        name, price: Number(price), durationDays: Number(durationDays),
                        dailyIncome: Number(dailyIncome), roi: Number(roi), imageUrl,
                        status: true, createdAt: serverTimestamp()
                    }).then(() => loadProducts());
                }
            };
            window.deleteProduct = async (id) => {
                if (confirm("Delete product?")) {
                    await deleteDoc(doc(db, "products", id));
                    loadProducts();
                }
            };
        }

        // Withdrawals management
        async function loadWithdrawals() {
            const wRef = collection(db, "withdrawals");
            const q = query(wRef, where("status", "==", "pending"), orderBy("createdAt", "desc"));
            const snapshot = await getDocs(q);
            let html = `<h2 class="text-2xl font-bold mb-4">Pending Withdrawals</h2><div class="bg-white rounded shadow"><table class="min-w-full"><thead><tr><th>User</th><th>Amount</th><th>Date</th><th>Actions</th></tr></thead><tbody>`;
            for (const docSnap of snapshot.docs) {
                const w = docSnap.data();
                const userDoc = await getDoc(doc(db, "users", w.userId));
                const userName = userDoc.exists() ? userDoc.data().displayName : "Unknown";
                html += `<tr><td>${userName}</td><td>${formatMoney(w.amount)}</td><td>${w.createdAt?.toDate().toLocaleString()}</td><td><button onclick="approveWithdrawal('${docSnap.id}', ${w.amount}, '${w.userId}')" class="bg-green-500 text-white px-2 py-1 rounded mr-2">Approve</button><button onclick="rejectWithdrawal('${docSnap.id}', ${w.amount}, '${w.userId}')" class="bg-red-500 text-white px-2 py-1 rounded">Reject</button></td></tr>`;
            }
            html += `</tbody></table></div>`;
            document.getElementById("adminContent").innerHTML = html;
            window.approveWithdrawal = async (withdrawalId, amount, userId) => {
                await updateDoc(doc(db, "withdrawals", withdrawalId), { status: "approved", processedAt: serverTimestamp() });
                await updateDoc(doc(db, "users", userId), {
                    pendingBalance: increment(-amount),
                    totalWithdrawn: increment(amount)
                });
                loadWithdrawals();
            };
            window.rejectWithdrawal = async (withdrawalId, amount, userId) => {
                await updateDoc(doc(db, "withdrawals", withdrawalId), { status: "rejected", processedAt: serverTimestamp() });
                await updateDoc(doc(db, "users", userId), {
                    pendingBalance: increment(-amount),
                    availableBalance: increment(amount)
                });
                loadWithdrawals();
            };
        }

        // Gift Codes management
        async function loadGiftCodes() {
            const codesSnapshot = await getDocs(collection(db, "giftCodes"));
            let html = `<h2 class="text-2xl font-bold mb-4">Gift Codes</h2><button onclick="generateGiftCode()" class="mb-4 bg-green-600 text-white px-4 py-2 rounded">+ Generate New Code</button><div class="bg-white rounded shadow overflow-x-auto"><table class="min-w-full"><thead><tr><th>Code</th><th>Amount</th><th>Expiry</th><th>Used</th><th>Status</th></tr></thead><tbody>`;
            codesSnapshot.forEach(docSnap => {
                const c = docSnap.data();
                html += `<tr><td>${c.code}</td><td>${formatMoney(c.amount)}</td><td>${c.expiryDate?.toDate().toLocaleDateString() || "Never"}</td><td>${c.usedCount || 0} / ${c.maxUses || "∞"}</td><td>${c.status}</td></tr>`;
            });
            html += `</tbody></table></div>`;
            document.getElementById("adminContent").innerHTML = html;
            window.generateGiftCode = async () => {
                const amount = prompt("Gift code amount (Ksh):");
                if (amount && !isNaN(amount)) {
                    const code = Math.random().toString(36).substring(2, 10).toUpperCase();
                    await addDoc(collection(db, "giftCodes"), {
                        code: code,
                        amount: Number(amount),
                        expiryDate: null, // no expiry
                        maxUses: 1,
                        usedCount: 0,
                        status: "active",
                        createdBy: currentUser.uid,
                        createdAt: serverTimestamp()
                    });
                    alert(`Code generated: ${code}`);
                    loadGiftCodes();
                }
            };
        }

        // Section switcher
        function setSection(section) {
            if (section === 'users') loadUsers();
            else if (section === 'products') loadProducts();
            else if (section === 'withdrawals') loadWithdrawals();
            else if (section === 'giftcodes') loadGiftCodes();
        }

        // Auth check
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (!userDoc.exists() || userDoc.data().role !== "admin") {
                    alert("Access denied. Admins only.");
                    signOut(auth);
                    window.location.href = "registration.html";
                    return;
                }
                currentUser = user;
                setSection('users'); // default
                // Setup navigation
                document.querySelectorAll('[data-section]').forEach(el => {
                    el.addEventListener('click', (e) => {
                        e.preventDefault();
                        setSection(el.dataset.section);
                    });
                });
                document.getElementById('logoutBtn').addEventListener('click', () => {
                    signOut(auth);
                    window.location.href = "registration.html";
                });
            } else {
                window.location.href = "registration.html";
            }
        });
    </script>
</body>
</html>
