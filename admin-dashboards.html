<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanDollar - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #f9fafb; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .admin-nav.active { background-color: #eef2ff; color: #4f46e5; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1f2937; color: white; padding: 12px 24px; border-radius: 8px; z-index: 1000; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #6366f1; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body>
    <nav class="fixed top-0 left-0 right-0 bg-white shadow-md z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-2">
                    <div class="w-10 h-10 rounded-xl gradient-bg flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                    </div>
                    <span class="font-bold text-xl text-gray-800">Urban<span class="text-indigo-600">Dollar</span> Admin</span>
                </div>
                <button onclick="logout()" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600">Logout</button>
            </div>
        </div>
    </nav>

    <div class="flex flex-col md:flex-row pt-16">
        <!-- Sidebar -->
        <div class="md:w-64 bg-white shadow-sm min-h-screen p-4">
            <div class="space-y-2">
                <button onclick="showTab('stats')" class="admin-nav w-full text-left px-4 py-2 rounded-lg hover:bg-indigo-50 transition">Dashboard</button>
                <button onclick="showTab('users')" class="admin-nav w-full text-left px-4 py-2 rounded-lg hover:bg-indigo-50 transition">Manage Users</button>
                <button onclick="showTab('products')" class="admin-nav w-full text-left px-4 py-2 rounded-lg hover:bg-indigo-50 transition">Manage Products</button>
                <button onclick="showTab('withdrawals')" class="admin-nav w-full text-left px-4 py-2 rounded-lg hover:bg-indigo-50 transition">Withdrawals</button>
                <button onclick="showTab('giftcodes')" class="admin-nav w-full text-left px-4 py-2 rounded-lg hover:bg-indigo-50 transition">Gift Codes</button>
                <button onclick="showTab('tasks')" class="admin-nav w-full text-left px-4 py-2 rounded-lg hover:bg-indigo-50 transition">Daily Task Settings</button>
                <button onclick="showTab('settings')" class="admin-nav w-full text-left px-4 py-2 rounded-lg hover:bg-indigo-50 transition">Settings</button>
            </div>
        </div>

        <!-- Content -->
        <div class="flex-1 p-6">
            <!-- Stats Tab -->
            <div id="statsTab" class="admin-tab">
                <h2 class="text-2xl font-bold mb-6">Platform Statistics</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
                    <div class="bg-white rounded-xl p-6 shadow-sm"><p class="text-gray-500">Total Users</p><p id="adminTotalUsers" class="text-2xl font-bold">0</p></div>
                    <div class="bg-white rounded-xl p-6 shadow-sm"><p class="text-gray-500">Active Packages</p><p id="adminActivePackages" class="text-2xl font-bold">0</p></div>
                    <div class="bg-white rounded-xl p-6 shadow-sm"><p class="text-gray-500">Total Deposits</p><p id="adminTotalDeposits" class="text-2xl font-bold">Ksh 0</p></div>
                    <div class="bg-white rounded-xl p-6 shadow-sm"><p class="text-gray-500">Pending Withdrawals</p><p id="adminPendingWithdrawals" class="text-2xl font-bold">0</p></div>
                </div>
                <div class="bg-white rounded-xl p-6 shadow-sm"><h3 class="text-lg font-bold mb-4">Recent Activity</h3><div id="adminRecentActivity" class="space-y-2"></div></div>
            </div>

            <!-- Users Tab -->
            <div id="usersTab" class="admin-tab hidden"><h2 class="text-2xl font-bold mb-6">Manage Users</h2><div id="adminUsersList" class="space-y-4"></div></div>

            <!-- Products Tab -->
            <div id="productsTab" class="admin-tab hidden"><h2 class="text-2xl font-bold mb-6">Manage Products</h2><button onclick="showAddProductForm()" class="mb-4 bg-green-600 text-white px-4 py-2 rounded-lg">Add New Product</button><div id="adminProductsList" class="space-y-4"></div><div id="addProductForm" class="hidden mt-6 bg-white p-6 rounded-xl shadow-sm"><h3 class="text-lg font-bold mb-4">Add Product</h3><div class="space-y-3"><input type="text" id="prodName" placeholder="Name" class="w-full border rounded-lg px-4 py-2"><input type="number" id="prodPrice" placeholder="Price (Ksh)" class="w-full border rounded-lg px-4 py-2"><input type="number" id="prodDuration" placeholder="Duration (days)" class="w-full border rounded-lg px-4 py-2"><input type="number" id="prodROI" placeholder="ROI (%)" class="w-full border rounded-lg px-4 py-2"><input type="number" id="prodDailyIncome" placeholder="Daily Income (Ksh)" class="w-full border rounded-lg px-4 py-2"><input type="text" id="prodImageUrl" placeholder="Image URL" class="w-full border rounded-lg px-4 py-2"><button onclick="addProduct()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg">Save Product</button><button onclick="hideAddProductForm()" class="ml-2 bg-gray-300 px-4 py-2 rounded-lg">Cancel</button></div></div></div>

            <!-- Withdrawals Tab -->
            <div id="withdrawalsTab" class="admin-tab hidden"><h2 class="text-2xl font-bold mb-6">Pending Withdrawals</h2><div id="adminWithdrawalsList" class="space-y-4"></div></div>

            <!-- Gift Codes Tab -->
            <div id="giftcodesTab" class="admin-tab hidden"><h2 class="text-2xl font-bold mb-6">Gift Codes</h2><div class="bg-white p-6 rounded-xl shadow-sm mb-6"><h3 class="text-lg font-bold mb-4">Generate New Code</h3><div class="space-y-3"><input type="number" id="giftAmount" placeholder="Amount (Ksh)" class="w-full border rounded-lg px-4 py-2"><input type="date" id="giftExpiry" class="w-full border rounded-lg px-4 py-2"><input type="number" id="giftMaxUses" placeholder="Max Uses (0 = unlimited)" class="w-full border rounded-lg px-4 py-2"><button onclick="generateGiftCode()" class="bg-purple-600 text-white px-4 py-2 rounded-lg">Generate Code</button></div></div><div id="adminGiftCodesList" class="space-y-4"></div></div>

            <!-- Tasks Tab -->
            <div id="tasksTab" class="admin-tab hidden"><h2 class="text-2xl font-bold mb-6">Daily Task Configuration</h2><div class="bg-white p-6 rounded-xl shadow-sm"><div class="space-y-4"><div><label class="block text-gray-700 mb-2">Commission Amount (Ksh)</label><input type="number" id="taskCommissionAdmin" class="w-full border rounded-lg px-4 py-2"></div><div><label class="block text-gray-700 mb-2">Task Status</label><select id="taskStatusAdmin" class="w-full border rounded-lg px-4 py-2"><option value="active">Active</option><option value="inactive">Inactive</option></select></div><button onclick="saveTaskSettings()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg">Save Settings</button></div></div></div>

            <!-- Settings Tab -->
            <div id="settingsTab" class="admin-tab hidden"><h2 class="text-2xl font-bold mb-6">Platform Settings</h2><div class="bg-white p-6 rounded-xl shadow-sm"><div class="space-y-4"><div><label class="block text-gray-700 mb-2">Referral Bonus Percentage (%)</label><input type="number" id="referralPercentAdmin" class="w-full border rounded-lg px-4 py-2" value="15"></div><button onclick="saveSettings()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg">Save Settings</button></div></div></div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, addDoc, query, where, getDocs, orderBy, limit, increment, serverTimestamp, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { /* same config */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserId = null;

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${isError ? 'bg-red-500' : 'bg-gray-800'}`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        function formatCurrency(amount) {
            return 'Ksh ' + amount.toLocaleString('en-KE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        async function logout() {
            await signOut(auth);
            window.location.href = 'index.html';
        }

        function showTab(tab) {
            document.querySelectorAll('.admin-tab').forEach(el => el.classList.add('hidden'));
            document.getElementById(tab + 'Tab').classList.remove('hidden');
            document.querySelectorAll('.admin-nav').forEach(btn => btn.classList.remove('bg-indigo-50', 'text-indigo-600'));
            event.target.classList.add('bg-indigo-50', 'text-indigo-600');
            if (tab === 'stats') loadAdminStats();
            if (tab === 'users') loadAdminUsers();
            if (tab === 'products') loadAdminProducts();
            if (tab === 'withdrawals') loadAdminWithdrawals();
            if (tab === 'giftcodes') loadAdminGiftCodes();
            if (tab === 'tasks') loadAdminTaskSettings();
        }

        async function loadAdminStats() {
            const usersSnap = await getDocs(collection(db, 'users'));
            document.getElementById('adminTotalUsers').innerText = usersSnap.size;
            const subsSnap = await getDocs(query(collection(db, 'subscriptions'), where('status', '==', 'active')));
            document.getElementById('adminActivePackages').innerText = subsSnap.size;
            const depositsSnap = await getDocs(query(collection(db, 'transactions'), where('type', '==', 'deposit'), where('status', '==', 'completed')));
            let totalDeposits = 0;
            depositsSnap.forEach(d => totalDeposits += d.data().amount);
            document.getElementById('adminTotalDeposits').innerText = formatCurrency(totalDeposits);
            const pendingWithdrawalsSnap = await getDocs(query(collection(db, 'withdrawals'), where('status', '==', 'pending')));
            document.getElementById('adminPendingWithdrawals').innerText = pendingWithdrawalsSnap.size;
        }

        async function loadAdminUsers() {
            const container = document.getElementById('adminUsersList');
            const usersSnap = await getDocs(collection(db, 'users'));
            container.innerHTML = '';
            usersSnap.forEach(docSnap => {
                const user = docSnap.data();
                const div = document.createElement('div');
                div.className = 'bg-white p-4 rounded-xl shadow-sm flex justify-between items-center';
                div.innerHTML = `
                    <div><p class="font-bold">${user.displayName}</p><p class="text-sm text-gray-500">${user.email}</p><p class="text-sm">Balance: ${formatCurrency(user.availableBalance)} | Invested: ${formatCurrency(user.totalInvested)}</p></div>
                    <button onclick="editUserBalance('${docSnap.id}')" class="bg-indigo-600 text-white px-3 py-1 rounded text-sm">Edit Balance</button>
                `;
                container.appendChild(div);
            });
        }

        window.editUserBalance = async function(uid) {
            const newBalance = prompt('Enter new available balance (Ksh):');
            if (newBalance !== null && !isNaN(parseFloat(newBalance))) {
                await updateDoc(doc(db, 'users', uid), { availableBalance: parseFloat(newBalance) });
                showToast('Balance updated');
                loadAdminUsers();
            }
        };

        async function loadAdminProducts() {
            const container = document.getElementById('adminProductsList');
            const productsSnap = await getDocs(collection(db, 'products'));
            container.innerHTML = '';
            productsSnap.forEach(docSnap => {
                const prod = docSnap.data();
                const div = document.createElement('div');
                div.className = 'bg-white p-4 rounded-xl shadow-sm flex justify-between items-center';
                div.innerHTML = `
                    <div><p class="font-bold">${prod.name}</p><p>Price: ${formatCurrency(prod.price)} | Daily: ${formatCurrency(prod.dailyIncome)}</p><p>Status: ${prod.status ? 'Active' : 'Inactive'}</p></div>
                    <button onclick="deleteProduct('${docSnap.id}')" class="bg-red-500 text-white px-3 py-1 rounded text-sm">Delete</button>
                `;
                container.appendChild(div);
            });
        }

        window.showAddProductForm = function() { document.getElementById('addProductForm').classList.remove('hidden'); };
        window.hideAddProductForm = function() { document.getElementById('addProductForm').classList.add('hidden'); };
        window.addProduct = async function() {
            const name = document.getElementById('prodName').value;
            const price = parseFloat(document.getElementById('prodPrice').value);
            const duration = parseInt(document.getElementById('prodDuration').value);
            const roi = parseFloat(document.getElementById('prodROI').value);
            const dailyIncome = parseFloat(document.getElementById('prodDailyIncome').value);
            const imageUrl = document.getElementById('prodImageUrl').value;
            if (!name || isNaN(price) || isNaN(duration) || isNaN(roi) || isNaN(dailyIncome)) {
                showToast('Please fill all fields', true); return;
            }
            await addDoc(collection(db, 'products'), {
                name, price, durationDays: duration, roi, dailyIncome, imageUrl, status: true, createdAt: serverTimestamp()
            });
            showToast('Product added');
            hideAddProductForm();
            loadAdminProducts();
            // Clear fields
            ['prodName','prodPrice','prodDuration','prodROI','prodDailyIncome','prodImageUrl'].forEach(id => document.getElementById(id).value = '');
        };
        window.deleteProduct = async function(id) {
            if (confirm('Delete this product?')) {
                await deleteDoc(doc(db, 'products', id));
                showToast('Product deleted');
                loadAdminProducts();
            }
        };

        async function loadAdminWithdrawals() {
            const container = document.getElementById('adminWithdrawalsList');
            const pendingSnap = await getDocs(query(collection(db, 'withdrawals'), where('status', '==', 'pending')));
            container.innerHTML = '';
            pendingSnap.forEach(docSnap => {
                const w = docSnap.data();
                const div = document.createElement('div');
                div.className = 'bg-white p-4 rounded-xl shadow-sm';
                div.innerHTML = `
                    <p><strong>User:</strong> ${w.userId}</p>
                    <p><strong>Amount:</strong> ${formatCurrency(w.amount)}</p>
                    <p><strong>Method:</strong> ${w.method}</p>
                    <p><strong>Details:</strong> ${w.accountDetails}</p>
                    <div class="mt-2 flex gap-2">
                        <button onclick="approveWithdrawal('${docSnap.id}', ${w.amount}, '${w.userId}')" class="bg-green-600 text-white px-3 py-1 rounded text-sm">Approve</button>
                        <button onclick="rejectWithdrawal('${docSnap.id}', ${w.amount}, '${w.userId}')" class="bg-red-500 text-white px-3 py-1 rounded text-sm">Reject</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        window.approveWithdrawal = async function(id, amount, userId) {
            const batch = writeBatch(db);
            batch.update(doc(db, 'withdrawals', id), { status: 'approved', processedAt: serverTimestamp() });
            batch.update(doc(db, 'users', userId), { pendingBalance: increment(-amount), totalWithdrawn: increment(amount) });
            await batch.commit();
            showToast('Withdrawal approved');
            loadAdminWithdrawals();
            loadAdminStats();
        };
        window.rejectWithdrawal = async function(id, amount, userId) {
            const batch = writeBatch(db);
            batch.update(doc(db, 'withdrawals', id), { status: 'rejected', processedAt: serverTimestamp() });
            batch.update(doc(db, 'users', userId), { pendingBalance: increment(-amount), availableBalance: increment(amount), totalBalance: increment(amount) });
            await batch.commit();
            showToast('Withdrawal rejected, funds returned');
            loadAdminWithdrawals();
            loadAdminStats();
        };

        async function loadAdminGiftCodes() {
            const container = document.getElementById('adminGiftCodesList');
            const codesSnap = await getDocs(collection(db, 'giftCodes'));
            container.innerHTML = '';
            codesSnap.forEach(docSnap => {
                const code = docSnap.data();
                const div = document.createElement('div');
                div.className = 'bg-white p-4 rounded-xl shadow-sm flex justify-between items-center';
                div.innerHTML = `
                    <div><p class="font-bold">${docSnap.id}</p><p>Amount: ${formatCurrency(code.amount)} | Uses: ${code.usedCount || 0}/${code.maxUses || '∞'}</p><p>Status: ${code.status} | Expiry: ${code.expiryDate ? code.expiryDate.toDate().toLocaleDateString() : 'Never'}</p></div>
                    <button onclick="deleteGiftCode('${docSnap.id}')" class="bg-red-500 text-white px-3 py-1 rounded text-sm">Delete</button>
                `;
                container.appendChild(div);
            });
        }

        window.generateGiftCode = async function() {
            const amount = parseFloat(document.getElementById('giftAmount').value);
            const expiry = document.getElementById('giftExpiry').value;
            const maxUses = parseInt(document.getElementById('giftMaxUses').value) || 0;
            if (isNaN(amount) || amount <= 0) { showToast('Enter valid amount', true); return; }
            const code = Math.random().toString(36).substring(2, 10).toUpperCase();
            const expiryDate = expiry ? new Date(expiry) : null;
            await setDoc(doc(db, 'giftCodes', code), {
                amount: amount,
                expiryDate: expiryDate ? serverTimestamp() : null,
                maxUses: maxUses || null,
                usedCount: 0,
                createdBy: currentUserId,
                status: 'active'
            });
            showToast(`Gift code generated: ${code}`);
            loadAdminGiftCodes();
        };
        window.deleteGiftCode = async function(code) {
            if (confirm('Delete this gift code?')) {
                await deleteDoc(doc(db, 'giftCodes', code));
                loadAdminGiftCodes();
            }
        };

        async function loadAdminTaskSettings() {
            const taskDoc = await getDoc(doc(db, 'tasks', 'daily'));
            if (taskDoc.exists()) {
                const task = taskDoc.data();
                document.getElementById('taskCommissionAdmin').value = task.commission;
                document.getElementById('taskStatusAdmin').value = task.status;
            } else {
                document.getElementById('taskCommissionAdmin').value = 10;
                document.getElementById('taskStatusAdmin').value = 'active';
            }
        }
        window.saveTaskSettings = async function() {
            const commission = parseFloat(document.getElementById('taskCommissionAdmin').value);
            const status = document.getElementById('taskStatusAdmin').value;
            await setDoc(doc(db, 'tasks', 'daily'), {
                commission: commission,
                status: status,
                name: 'Daily Task',
                frequency: 'daily',
                lastReset: serverTimestamp()
            });
            showToast('Task settings saved');
        };
        window.saveSettings = async function() {
            const referralPercent = parseFloat(document.getElementById('referralPercentAdmin').value);
            await setDoc(doc(db, 'settings', 'platform'), {
                referralBonusPercentage: referralPercent,
                updatedAt: serverTimestamp()
            });
            showToast('Settings saved');
        };

        // Auth guard
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserId = user.uid;
                const userDoc = await getDoc(doc(db, 'users', currentUserId));
                if (userDoc.exists() && userDoc.data().role === 'admin') {
                    // Load initial tab
                    showTab('stats');
                } else {
                    await signOut(auth);
                    window.location.href = 'index.html';
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        window.showTab = showTab;
        window.logout = logout;
    </script>
</body>
</html>
